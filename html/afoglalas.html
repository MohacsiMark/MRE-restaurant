    <main>
        <section id="guest-view" class="auth-needed">
            <h2>Asztalfoglaláshoz bejelentkezés szükséges</h2>
            <p>Kérjük, jelentkezzen be, hogy asztalt foglalhasson!</p>
            <a href="register.html" class="btn-action">Bejelentkezés / Regisztráció</a>
        </section>

        <section id="user-view" class="reservation-section hidden">
            <div class="reservation-container">
                <h2>Asztalfoglalás</h2>
                <div class="reservation-form">
                    <h3>Foglaljon asztalt nálunk!</h3>
                    <form id="bookingForm">
                        <label for="name">Neve:</label>
                        <input type="text" id="name" name="name" required readonly>

                        <label for="date">Foglalás dátuma:</label>
                        <input type="date" id="date" name="date" require>

                        <label for="time">Foglalás ideje:</label>
                        <input type="time" id="time" name="time" required>

                        <label for="party-size">Létszám:</label>
                        <select id="party-size" name="party-size" required class="fo">
                            <option value="2">2 fő</option>
                            <option value="4">4 fő</option>
                            <option value="6">6 fő</option>
                            <option value="8">8 fő</option>
                        </select>

                        <label for="special-requests">Különleges kérés:</label>
                        <textarea id="special-requests" name="special-requests" rows="4"></textarea>

                        <button type="submit">Foglalás küldése</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <script>
    function showAlert(message) {
        const overlay = document.createElement("div");
        overlay.className = "custom-alert";
        const content = document.createElement("div");
        content.className = "alert-content";
        const text = document.createElement("p");
        text.textContent = message;
        const btn = document.createElement("button");
        btn.textContent = "Értettem";
        btn.onclick = () => {
            document.body.removeChild(overlay);
            if(message.includes("Sikeres")) window.location.href = "profil.html";
        };
        content.appendChild(text);
        content.appendChild(btn);
        overlay.appendChild(content);
        document.body.appendChild(overlay);
    }

    document.addEventListener("DOMContentLoaded", () => {
        const loggedInUser = JSON.parse(localStorage.getItem("logged_in_user"));
        const guestView = document.getElementById("guest-view");
        const userView = document.getElementById("user-view");

        if (loggedInUser) {
            guestView.classList.add("hidden");
            userView.classList.remove("hidden");
            document.getElementById("name").value = loggedInUser.name;
        }

        document.getElementById("bookingForm").addEventListener("submit", (e) => {
            e.preventDefault();
            
            const booking = {
                id: Date.now(),
                date: document.getElementById("date").value,
                time: document.getElementById("time").value,
                guests: document.getElementById("party-size").value,
                note: document.getElementById("special-requests").value,
                timestamp: new Date().toLocaleString()
            };

            const userKey = "user_" + loggedInUser.name;
            const userData = JSON.parse(localStorage.getItem(userKey));
            
            if (!userData.bookings) userData.bookings = [];
            userData.bookings.push(booking);
            
            localStorage.setItem(userKey, JSON.stringify(userData));
            localStorage.setItem("logged_in_user", JSON.stringify(userData));

            showAlert("Sikeres foglalás! Várunk szeretettel.");
        });
    });
</script>
